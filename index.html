<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Tugas Kuliah</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="space-canvas"></canvas>

  <div class="topbar">
    <div class="brand">Tugas<span>.</span></div>
    <div class="tab-group">
      <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">
        Aktif <span class="tab-badge" id="badge-active">0</span>
      </button>
      <button class="tab-btn" id="tab-done" onclick="switchTab('done')">
        Selesai <span class="tab-badge" id="badge-done">0</span>
      </button>
    </div>
  </div>

  <div class="content">

    <div class="page active" id="page-active">
      <div id="list-active"></div>
    </div>

    <div class="page" id="page-done">
      <div id="stats-bar-wrap"></div>
      <div id="list-done"></div>
    </div>

  </div>

  <button class="fab" id="fab" title="Tambah tugas">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">Tambah Tugas</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>

      <div class="form-field">
        <label class="form-label" for="inp-task">Nama Tugas</label>
        <input class="form-input" type="text" id="inp-task" placeholder="Contoh: Buat laporan UTS...">
      </div>

      <div class="form-field">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
          <label class="form-label" for="inp-course" style="margin-bottom: 0;">Mata Kuliah / Kategori</label>
          <button onclick="openCourseModal()" type="button" style="background: none; border: none; color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; text-transform: uppercase; transition: 0.2s;">Kelola</button>
        </div>
        <select class="form-select" id="inp-course">
          </select>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="inp-date">Tenggat Waktu & Jam</label>
          <input class="form-input" type="datetime-local" id="inp-date">
        </div>
        <div class="form-field">
          <label class="form-label" for="inp-priority">Prioritas</label>
          <select class="form-select" id="inp-priority">
            <option value="normal" selected>Normal</option>
            <option value="tinggi">Tinggi</option>
            <option value="rendah">Rendah</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="inp-notes">Catatan (Opsional)</label>
        <textarea class="form-textarea" id="inp-notes" placeholder="Detail tambahan, referensi, atau instruksi..."></textarea>
      </div>

      <button class="btn-submit" onclick="addTask()">Simpan Tugas</button>
    </div>
  </div>

  <div class="overlay" id="overlay-course">
    <div class="modal" id="modal-course">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">Mata Kuliah</span>
        <button class="modal-close" onclick="closeCourseModal()">&#x2715;</button>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 16px;">
        <input class="form-input" type="text" id="inp-new-course" placeholder="Misal: Aljabar Abstrak, Metode Numerik...">
        <button class="btn-submit" style="width: auto; margin-top: 0; padding: 11px 20px;" onclick="addCourse()">Tambah</button>
      </div>

      <div class="section-label" style="margin-top: 0;">Daftar Mata Kuliah Tersimpan</div>
      <div id="course-list-container" style="max-height: 250px; overflow-y: auto; padding-right: 5px; margin-top: 10px;">
        </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
